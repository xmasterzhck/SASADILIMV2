<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Kawaii Fan Hub</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #ff9ed8, #8fd3ff);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(15px);
        width: 100%;
        max-width: 450px;
        border-radius: 25px;
        padding: 35px 25px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        text-align: center;
        animation: floatIn 0.8s ease-out;
    }

    @keyframes floatIn {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .logo {
        font-size: 50px;
        margin-bottom: 10px;
    }

    h1 {
        color: #ff4da6;
        font-size: 26px;
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 14px;
        color: #555;
        margin-bottom: 25px;
    }

    .input-box {
        width: 100%;
        padding: 14px;
        border-radius: 15px;
        border: 2px solid #ffd1f3;
        outline: none;
        font-size: 14px;
        transition: 0.3s;
        margin-bottom: 18px;
    }

    .input-box:focus {
        border-color: #ff4da6;
        box-shadow: 0 0 10px rgba(255,77,166,0.4);
    }

    .btn {
        display: block;
        width: 100%;
        padding: 14px;
        border-radius: 18px;
        background: linear-gradient(90deg, #ff4da6, #ff85c1);
        color: white;
        font-weight: bold;
        text-decoration: none;
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(255,77,166,0.3);
    }

    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(255,77,166,0.4);
    }

    .features {
        margin-top: 25px;
        text-align: left;
        font-size: 13px;
        color: #444;
    }

    .features li {
        margin-bottom: 8px;
        list-style: none;
    }

    .footer {
        margin-top: 25px;
        font-size: 11px;
        color: #777;
    }

    @media (max-width: 400px) {
        .card {
            padding: 25px 20px;
        }
        h1 {
            font-size: 22px;
        }
    }
</style>
</head>

<body>

<div class="card">
    <div class="logo">🎀🎮</div>
    <h1>Za Ganxiong</h1>
    <div class="subtitle">
        Level up your adventure ✨ Make friends 💖 Stay awesome 😎
    </div>

    <input class="input-box" type="text" placeholder="Enter your Roblox username">

    <a class="btn" href="https://roblox.com.ge/communities/2301077316/" target="_blank">
        JOIN HERE TO VERIFY YOUR ACCOUNT
    </a>

    <ul class="features">
        <li>🌸 Cute aesthetic gamer vibes</li>
        <li>✨ Safe fan-made project</li>
        <li>📱 Fully mobile responsive</li>
        <li>💎 Smooth modern UI</li>
    </ul>

    <div class="footer">
        This is a fan-made page and is not affiliated with Roblox.
    </div>
</div>

</body>
</html>
